.toggle-button input[type="checkbox"] {

/* Style the custom checkbox */
.toggle-button label {
  display: inline-block;
  width: 20px; /* Set width */
  height: 20px; /* Set height */
  background-color: #ccc;
  border-radius: 50%; /* Make it round */
  cursor: pointer;
  position: absolute;
}

/* Style the checked state of the custom checkbox */
.toggle-button input[type="checkbox"]:checked + label {
  background-color: #8be31e;
}

/* Style the slider inside the custom checkbox */
.toggle-button label::before {
  content: "";
  position: absolute;
  width: 12px; /* Set width of the slider */
  height: 12px; /* Set height of the slider */
  background-color: white;
  border-radius: 50%; /* Make it round */
  left: 20%; /* Adjust position */
  top: 20%; /* Adjust position */
  transition: transform 0.3s ease;
}

/* Style the slider when checkbox is checked */
.toggle-button input[type="checkbox"]:checked + label::before {
  transform:scale(0.88)

// Function to calculate percentile for a specific player
function percentile(players, player, columnIndex) {
    const value = player[columnIndex];
    const columnValues = players.map(p => p[columnIndex]);
    const sorted = columnValues.slice().sort((a, b) => a - b);
    const index = sorted.findIndex(item => item >= value);
    return (index + 1) / sorted.length * 100;
}

// Function to calculate performance index
function calculatePerformanceIndexForPosition(positionData, position, columnMapping) {
    Object.keys(positionData[position]).forEach(league => {
        const playersInSameLeaguePosition = positionData[position][league];
        const columns = columnMapping[position];

        // Calculate average percentiles for all players once
        const averagePercentiles = playersInSameLeaguePosition.map(player => {
            return columns.map((columnIndex, index) => {
                return allPercentiles[position][league][playersInSameLeaguePosition.indexOf(player)][index];
            });
        });

        // Find highest average percentile
        const highestAveragePercentile = Math.max(...averagePercentiles.map(p => p.reduce((a, b) => a + b, 0) / columns.length));

        // Calculate and update performance index for each player
        playersInSameLeaguePosition.forEach(player => {
            const sumOfPercentiles = columns.reduce((sum, columnIndex, index) => {
                return sum + averagePercentiles[playersInSameLeaguePosition.indexOf(player)][index];
            }, 0);

            const averagePercentile = sumOfPercentiles / columns.length;
            const minutesPlayedPercentile = percentile(playersInSameLeaguePosition, player, 6);
            const inverseMinutesPlayedPercentile = 100 - minutesPlayedPercentile;

            const normalizedIndex = ((averagePercentile / highestAveragePercentile)) - 0.00273 * inverseMinutesPlayedPercentile;
            const scaledIndex = Math.pow(normalizedIndex, 1.48);
            const minOld = 0, maxOld = 0.99;
            const minNew = 0.38, maxNew = 0.98;
            const transformedIndex = (((maxNew - minNew) / (maxOld - minOld)) * (scaledIndex - minOld) + minNew) * 100;

            player[5] = transformedIndex.toFixed(0);
        });
    });
}
